name: Release

on:
  push:
    tags:
      - 'v*'
  # Allows manual runs from the Actions UI for packaging verification.
  # Build artifacts are uploaded and downloadable without creating a Release.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string used for artifact naming (e.g. 0.0.0-test)'
        default: '0.0.0-test'
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────── Linux x86_64 (UV) ───────────────────────────
  build-linux:
    name: Build · Linux x86_64 (UV)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm install
      - run: npm run tauri build -- --bundles appimage

      - name: Package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          DIST="yutto-uiya-${VERSION}-linux-x86_64-uv"
          mkdir "$DIST"
          cp src-tauri/target/release/bundle/appimage/yutto-uiya_*.AppImage "$DIST/yutto-uiya.AppImage"
          chmod +x "$DIST/yutto-uiya.AppImage"
          # Copy Python source, strip bytecode cache
          cp -r python "$DIST/"
          find "$DIST/python" -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
          cp pyproject.toml uv.lock "$DIST/"
          tar czf "${DIST}.tar.gz" "$DIST"
          rm -rf "$DIST"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-uv
          path: "*.tar.gz"

  # ─────────────────────────── macOS Apple Silicon (UV) ───────────────────────────
  build-macos-arm:
    name: Build · macOS Apple Silicon (UV)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm install

      - name: Build
        env:
          APPLE_SIGNING_IDENTITY: '-'
        run: npm run tauri build -- --bundles app

      - name: Package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          DIST="yutto-uiya-${VERSION}-macos-aarch64-uv"
          mkdir "$DIST"
          cp -r "src-tauri/target/release/bundle/macos/yutto-uiya.app" "$DIST/"
          cp -r python "$DIST/"
          find "$DIST/python" -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
          cp pyproject.toml uv.lock "$DIST/"
          zip -r "${DIST}.zip" "$DIST"
          rm -rf "$DIST"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm-uv
          path: "*.zip"

  # ─────────────────────────── macOS Apple Silicon (Portable) ───────────────────────────
  build-macos-portable:
    name: Build · macOS Apple Silicon (Portable)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm install

      - name: Build
        env:
          APPLE_SIGNING_IDENTITY: '-'
        run: npm run tauri build -- --bundles app

      # Python env goes inside the .app so exe.parent() finds env/bin/python
      - name: Create portable Python env
        run: |
          curl -fsSL \
            "https://repo.anaconda.com/miniconda/Miniconda3-latest-MacOSX-arm64.sh" \
            -o miniconda.sh
          bash miniconda.sh -b -p /tmp/miniconda3
          /tmp/miniconda3/bin/conda create -y -p ./env python=3.11
          ./env/bin/python -m pip install --no-cache-dir \
            "pydantic>=2.10.6" \
            "tomli_w>=1.2.0" \
            "uiya-yutto==0.0.5" \
            "httpx[http2,socks]>=0.28.1" \
            "natsort>=8.4.0"

      - name: Download ffmpeg
        run: |
          curl -fsSL "https://evermeet.cx/ffmpeg/getrelease/zip" -o ffmpeg.zip
          unzip -q ffmpeg.zip -d ffmpeg_tmp
          cp ffmpeg_tmp/ffmpeg ./ffmpeg
          chmod +x ./ffmpeg

      - name: Package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          CONTENTS="src-tauri/target/release/bundle/macos/yutto-uiya.app/Contents/MacOS"
          # Bundle Python env, source, and ffmpeg inside the .app
          cp -r env "$CONTENTS/env"
          cp -r python "$CONTENTS/python"
          find "$CONTENTS/python" -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
          cp ffmpeg "$CONTENTS/ffmpeg"
          # Zip the whole .app
          DIST="yutto-uiya-${VERSION}-macos-aarch64-portable"
          mkdir "$DIST"
          cp -r "src-tauri/target/release/bundle/macos/yutto-uiya.app" "$DIST/"
          zip -r "${DIST}.zip" "$DIST"
          rm -rf "$DIST"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-portable
          path: "*.zip"

  # ─────────────────────────── Windows x86_64 (UV) ───────────────────────────
  build-windows-uv:
    name: Build · Windows x86_64 (UV)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm install
      - run: npm run tauri build -- --no-bundle

      - name: Package
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
          }
          $dist = "yutto-uiya-${version}-windows-x86_64-uv"
          New-Item -ItemType Directory $dist
          Copy-Item "src-tauri\target\release\yutto-uiya.exe" "$dist\"
          Copy-Item -Recurse "python" "$dist\"
          Get-ChildItem -Recurse "$dist\python" -Filter '__pycache__' -Directory |
            Remove-Item -Recurse -Force
          Copy-Item "pyproject.toml", "uv.lock" "$dist\"
          Compress-Archive -Path $dist -DestinationPath "${dist}.zip"
          Remove-Item -Recurse -Force $dist

      - uses: actions/upload-artifact@v4
        with:
          name: windows-uv
          path: "*.zip"

  # ─────────────────────────── Windows x86_64 (Portable) ───────────────────────────
  build-windows-portable:
    name: Build · Windows x86_64 (Portable)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm install
      - run: npm run tauri build -- --no-bundle

      # Install Miniconda to a temp dir, then create the bundled env at ./env
      # The app auto-detects env\python.exe next to the exe (resolve_portable_python_path)
      - name: Create portable Python env
        shell: pwsh
        run: |
          $installer = "$env:TEMP\miniconda.exe"
          Write-Host "Downloading Miniconda..."
          Invoke-WebRequest `
            -Uri "https://repo.anaconda.com/miniconda/Miniconda3-latest-Windows-x86_64.exe" `
            -OutFile $installer
          Write-Host "Installing Miniconda..."
          Start-Process -FilePath $installer `
            -ArgumentList "/S /D=C:\miniconda3" `
            -Wait -NoNewWindow
          Write-Host "Creating Python 3.11 env at ./env ..."
          & "C:\miniconda3\Scripts\conda.exe" create -y -p "$PWD\env" python=3.11
          Write-Host "Installing Python dependencies..."
          .\env\python.exe -m pip install --no-cache-dir `
            "pydantic>=2.10.6" `
            "tomli_w>=1.2.0" `
            "uiya-yutto==0.0.5" `
            "httpx[http2,socks]>=0.28.1" `
            "natsort>=8.4.0"

      # Download a static ffmpeg build (no extra DLLs required)
      - name: Download ffmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Write-Host "Downloading ffmpeg from $url ..."
          curl.exe -L --fail --retry 3 -o ffmpeg.zip $url
          $size = (Get-Item ffmpeg.zip).Length
          Write-Host "Downloaded $([math]::Round($size / 1MB, 1)) MB"
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $exe = Get-ChildItem -Recurse ffmpeg_tmp -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "ffmpeg.exe not found in archive"; exit 1 }
          Copy-Item $exe.FullName "$PWD\"
          Write-Host "ffmpeg.exe ready: $PWD\ffmpeg.exe"

      - name: Package
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
          }
          $dist = "yutto-uiya-${version}-windows-x86_64-portable"
          New-Item -ItemType Directory $dist
          Copy-Item "src-tauri\target\release\yutto-uiya.exe" "$dist\"
          Copy-Item -Recurse "python" "$dist\"
          Get-ChildItem -Recurse "$dist\python" -Filter '__pycache__' -Directory |
            Remove-Item -Recurse -Force
          # Bundled Python env — app detects env\python.exe automatically
          Copy-Item -Recurse "env" "$dist\"
          Copy-Item "ffmpeg.exe" "$dist\"
          Write-Host "Compressing..."
          Compress-Archive -Path $dist -DestinationPath "${dist}.zip"
          Remove-Item -Recurse -Force $dist

      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: "*.zip"

  # ─────────────────────────── Publish GitHub Release ───────────────────────────
  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux
      - build-macos-arm
      - build-macos-portable
      - build-windows-uv
      - build-windows-portable
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          # Mark as pre-release when the tag contains a hyphen (e.g. v2.0.0-rc.1)
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            linux-uv/*.tar.gz
            macos-arm-uv/*.zip
            macos-portable/*.zip
            windows-uv/*.zip
            windows-portable/*.zip
